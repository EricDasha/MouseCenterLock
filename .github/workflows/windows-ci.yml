name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Syntax check
        shell: pwsh
        run: |
          @'
          import ast, pathlib
          paths = [
              'app_logging.py',
              'mouse_center_lock_gui.py',
              'win_api.py',
              'widgets.py',
              'services/clicker_service.py',
              'services/lock_service.py',
              'services/tray_service.py',
              'ui/pages/common.py',
              'ui/pages/simple_page.py',
              'ui/pages/advanced_page.py',
          ]
          for path in paths:
              ast.parse(pathlib.Path(path).read_text(encoding='utf-8'), filename=path)
              print('AST_OK', path)
          '@ | python -

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Build smoke test
        run: pyinstaller --noconfirm --clean --distpath dist_ci --workpath build_ci MouseCenterLock.spec

      - name: Verify built executable
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist_ci/MouseCenterLock.exe")) {
            throw "Build output dist_ci/MouseCenterLock.exe was not created."
          }

      - name: Upload smoke-build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseCenterLock-windows-smoke
          path: dist_ci/MouseCenterLock.exe
